services:
  streamlit:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: dashboard_streamlit
    restart: unless-stopped
    networks:
      - dashboard_net

  nginx:
    image: nginx:1.25-alpine
    container_name: dashboard_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8085:80"
    depends_on:
      - streamlit
    restart: unless-stopped
    networks:
      - dashboard_net

networks:
  dashboard_net:
    driver: bridge